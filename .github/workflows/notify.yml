name: Push notification on data update

on:
  push:
    branches: [main]
    paths:
      - 'pwa-latam/data.json'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build push title and body
        id: data
        run: |
          DATA=$(cat pwa-latam/data.json)
          ROUTE_COUNT=$(echo "$DATA" | jq '.routes | length')

          # Para cada rota, pega a última entrada e calcula deltas
          BODY=""
          BEST_MILES=999999999
          BEST_NAME=""
          NUM_ROUTES=0

          for routeId in $(echo "$DATA" | jq -r '.routes | keys[]'); do
            NAME=$(echo "$DATA" | jq -r --arg id "$routeId" '.routes[$id].name // $id')
            LAST=$(echo "$DATA" | jq --arg id "$routeId" '.routes[$id].history[-1]')
            if [ "$LAST" = "null" ] || [ -z "$LAST" ]; then continue; fi

            TOTAL_MI=$(echo "$LAST" | jq -r '.totalMiles')
            TOTAL_BRL=$(echo "$LAST" | jq -r '.totalCashBRL')
            OUT_DATE=$(echo "$LAST" | jq -r '.out.depDate')
            RET_DATE=$(echo "$LAST" | jq -r '.ret.depDate')
            RET_FROM=$(echo "$LAST" | jq -r '.ret.from')

            OUT_FMT=$(echo "$OUT_DATE" | awk -F- '{print $3"/"$2}')
            RET_FMT=$(echo "$RET_DATE" | awk -F- '{print $3"/"$2}')

            # Histórico para detectar promoção
            PREV_MIN=$(echo "$DATA" | jq --arg id "$routeId" '[.routes[$id].history[:-1][].totalMiles] | min // 999999999')
            PROMO=""
            if [ "$TOTAL_MI" -lt "$PREV_MIN" ] 2>/dev/null && [ "$PREV_MIN" -ne 999999999 ] 2>/dev/null; then
              PROMO=" 🔥"
            fi

            MI_FMT=$(printf "%'d" "$TOTAL_MI" 2>/dev/null | tr ',' '.')
            BRL_FMT=$(printf "%.2f" "$TOTAL_BRL" | tr '.' ',')

            BODY="${BODY}• ${NAME}: ${MI_FMT} mi + R\$ ${BRL_FMT} (${OUT_FMT} → ${RET_FROM} ${RET_FMT})${PROMO}\n"

            # Rastreia rota com melhor preço pro título
            if [ "$TOTAL_MI" -lt "$BEST_MILES" ] 2>/dev/null; then
              BEST_MILES=$TOTAL_MI
              BEST_NAME=$NAME
            fi
            NUM_ROUTES=$((NUM_ROUTES + 1))
          done

          if [ "$NUM_ROUTES" -eq 0 ]; then
            TITLE="✈️ Caça-passagem"
            BODY="Sem dados disponíveis ainda"
          elif [ "$NUM_ROUTES" -eq 1 ]; then
            TITLE="✈️ Caça-passagem • ${BEST_NAME}"
          else
            TITLE="✈️ Caça-passagem • ${NUM_ROUTES} rotas atualizadas"
          fi

          # Remove last \n
          BODY=$(printf "%b" "$BODY" | sed '$ s/\\n$//')

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "Title: $TITLE"
          echo "Body:"
          echo "$BODY"

      - name: Send push via OneSignal
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: |
          if [ -z "$ONESIGNAL_APP_ID" ] || [ -z "$ONESIGNAL_REST_API_KEY" ]; then
            echo "Secrets nao configurados - pulando push"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg appId "$ONESIGNAL_APP_ID" \
            --arg title "${{ steps.data.outputs.title }}" \
            --arg body  "${{ steps.data.outputs.body }}" \
            --arg url   "https://cacapassagens.vercel.app" \
            --arg icon  "https://cacapassagens.vercel.app/icon-192.png" \
            '{app_id: $appId, included_segments: ["Subscribed Users"], headings: {pt: $title, en: $title}, contents: {pt: $body, en: $body}, url: $url, chrome_web_icon: $icon}')

          curl -sS -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Basic $ONESIGNAL_REST_API_KEY" \
            --data "$PAYLOAD"
          echo ""
          echo "Push enviado"
